<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Halısaha logo">
  <title>Halısaha</title>
  <!-- Pitch background, rounded -->
  <rect width="64" height="64" rx="14" fill="#059669"/>
  <!-- Outer pitch boundary (subtle inset) -->
  <rect x="6" y="6" width="52" height="52" rx="9" fill="none" stroke="#ffffff" stroke-opacity="0.85" stroke-width="1.6"/>
  <!-- Halfway line -->
  <line x1="32" y1="6" x2="32" y2="58" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Center circle -->
  <circle cx="32" cy="32" r="9" fill="none" stroke="#ffffff" stroke-width="1.6"/>
  <!-- Center spot -->
  <circle cx="32" cy="32" r="1.8" fill="#ffffff"/>
  <!-- Left penalty box -->
  <rect x="6" y="20" width="9" height="24" fill="none" stroke="#ffffff" stroke-width="1.6"/>
  <!-- Right penalty box -->
  <rect x="49" y="20" width="9" height="24" fill="none" stroke="#ffffff" stroke-width="1.6"/>
  <!-- Left goal area (small) -->
  <rect x="6" y="26" width="3.5" height="12" fill="none" stroke="#ffffff" stroke-width="1.4" stroke-opacity="0.85"/>
  <!-- Right goal area (small) -->
  <rect x="54.5" y="26" width="3.5" height="12" fill="none" stroke="#ffffff" stroke-width="1.4" stroke-opacity="0.85"/>
</svg>
