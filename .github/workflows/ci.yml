name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Dependency audit
        run: pnpm audit --prod --audit-level=high

      - name: i18n drift check
        run: pnpm i18n:check

      - name: Unit tests
        run: pnpm test

      - name: Build
        env:
          # Build needs these env vars present (validation only — values not used in CI)
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ci_dummy
          SUPABASE_SECRET_KEY: sb_secret_ci_dummy
          DATABASE_URL: postgresql://postgres:dummy@localhost:6543/postgres
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: pnpm build

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ci_dummy
          SUPABASE_SECRET_KEY: sb_secret_ci_dummy
          DATABASE_URL: postgresql://postgres:dummy@localhost:6543/postgres
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: pnpm build
      - name: Run e2e
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ci_dummy
          SUPABASE_SECRET_KEY: sb_secret_ci_dummy
          DATABASE_URL: postgresql://postgres:dummy@localhost:6543/postgres
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
        run: pnpm test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
