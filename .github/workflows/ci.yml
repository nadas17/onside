name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: i18n drift check
        run: pnpm i18n:check

      - name: Unit tests
        run: pnpm test

      - name: Build
        env:
          # Build needs these env vars present (validation only — values not used in CI)
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ci_dummy
          SUPABASE_SECRET_KEY: sb_secret_ci_dummy
          DATABASE_URL: postgresql://postgres:dummy@localhost:6543/postgres
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
        run: pnpm build
