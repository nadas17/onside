name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Vercel production deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Pull Vercel project info
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy (Vercel cloud build)
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Smoke test (/api/health)
        # Hits the stable production alias (always points to the latest --prod
        # deploy and is publicly accessible). Deployment-specific URLs are
        # gated by Vercel Deployment Protection (401 for unauthenticated probes).
        run: |
          curl -fsS https://onside-three.vercel.app/api/health | tee /tmp/health.json
          grep -q '"status":"ok"' /tmp/health.json
